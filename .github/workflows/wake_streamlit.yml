name: Wake Streamlit and run alerts

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 09:05 UTC = 11:05 in Serbia during summer time.
    # 10:05 UTC = 11:05 in Serbia during winter time.
    # Running both is intentional; EMAIL_LOG prevents duplicate alerts.
    - cron: "5 9 * * 1-5"
    - cron: "5 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lianbo-streamlit-daily-wake
  cancel-in-progress: false

jobs:
  wake-app:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.52.0
          playwright install --with-deps chromium

      - name: Open Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: python wake_streamlit.py

      - name: Upload diagnostic screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-wake-diagnostic-${{ github.run_number }}
          path: streamlit_wake_result.png
          if-no-files-found: ignore
          retention-days: 7
